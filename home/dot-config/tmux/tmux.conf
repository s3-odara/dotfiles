set -g mouse on
#setw -g alternate-screen on
set -g base-index 1
setw -g pane-base-index 1
set-option -g history-limit 10000
set-option -g renumber-windows on

#bind c new-window -c '#{pane_current_path}'
bind ';' split-window -hc '#{pane_current_path}'
bind "'" split-window -vc'#{pane_current_path}'
bind , new-window

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set-option -g default-terminal "tmux-256color" # 基本的にはscreen-256colorかtmux-256colorを設定
set -as terminal-features 'xterm-256color:RGB'
set -as terminal-features 'tmux-256color:RGB'

set -g set-clipboard on #OSC52によるクリップボードの書き込みを許可
set -g focus-events off # sshしてフォーカスが外れた時の挙動
set -g remain-on-exit failed
set -g remain-on-exit-format 'pane exited: #{pane_current_command} [#{pane_dead_status}] #{pane_dead_time}'

set -g escape-time 20
set -g repeat-time 1000

# repeatable window change
run-shell 'for i in $(seq 1 9); do tmux bind-key -r "$i" select-window -t:="$i"; done'
bind-key -r 0 select-window -t:=10

set -as terminal-features 'foot*:sixel'
set -as terminal-features 'tmux*:sixel'

# Emulate scrolling by sending up and down keys if these commands are running in the pane
# https://github.com/tmux/tmux/issues/1320#issuecomment-381952082
#tmux_commands_with_legacy_scroll="nano less more man git"

#bind-key -T root WheelUpPane \
	if-shell -Ft= '#{?mouse_any_flag,1,#{pane_in_mode}}' \
		'send -Mt=' \
		'if-shell -t= "#{?alternate_on,true,false} || echo \"#{tmux_commands_with_legacy_scroll}\" | grep -q \"#{pane_current_command}\"" \
			"send -t= Up" "copy-mode -et="'

#bind-key -T root WheelDownPane \
	if-shell -Ft = '#{?pane_in_mode,1,#{mouse_any_flag}}' \
		'send -Mt=' \
		'if-shell -t= "#{?alternate_on,true,false} || echo \"#{tmux_commands_with_legacy_scroll}\" | grep -q \"#{pane_current_command}\"" \
			"send -t= Down" "send -Mt="'

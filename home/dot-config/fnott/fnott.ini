[main]
# --- 表示先/サイズ ---
output=HDMI-A-1
min-width=525
max-width=525
max-height=0

title-font=sans serif:size=12
summary-font=sans serif:size=12
body-font=sans serif:size=12

summary-format=<b>%s</b>

# --- アイコン ---
max-icon-size=48

# --- timeout ---
# mako: 10000 ms → fnott: 10 sec
default-timeout=10

# --- サウンド (mako の on-notify=exec 相当) ---
# 再生するファイル
sound-file=/usr/share/sounds/freedesktop/stereo/message.oga
# 再生コマンド（${filename} が sound-file に展開されます）
play-sound=pw-play ${filename}

# --- アクション選択UI (makoctl menu ... wofi 相当の「選択UI」部分) ---
# fnottctl actions がこのコマンドを使ってアクションを選ばせます
selection-helper=wofi -d -p 'Action: '
# selection-helper-uses-null-separator=no  # 必要なら明示（既定は no）

[low]
layer=overlay
background=1e1e2ecc
border-color=89b4faff
border-size=2
border-radius=10
padding-horizontal=15
padding-vertical=15
title-color=cdd6f4ff
summary-color=cdd6f4ff
body-color=cdd6f4ff
progress-color=f5c2e7ff

[normal]
layer=overlay
background=1e1e2ecc
border-color=89b4faff
border-size=2
border-radius=10
padding-horizontal=15
padding-vertical=15
title-color=cdd6f4ff
summary-color=cdd6f4ff
body-color=cdd6f4ff
progress-color=f5c2e7ff

[critical]
layer=overlay
background=1e1e2ecc
border-color=89b4faff
border-size=2
border-radius=10
padding-horizontal=15
padding-vertical=15
title-color=cdd6f4ff
summary-color=cdd6f4ff
body-color=cdd6f4ff
progress-color=f5c2e7ff

